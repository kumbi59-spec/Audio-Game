<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="ic-bg" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#0d0e10"/>
      <stop offset="100%" stop-color="#1a1c20"/>
    </linearGradient>
    <linearGradient id="ic-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0e"/>
      <stop offset="100%" stop-color="#1c1e24"/>
    </linearGradient>
    <radialGradient id="ic-furnace" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8822"/>
      <stop offset="50%" stop-color="#cc4400"/>
      <stop offset="100%" stop-color="#882200" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ic-copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5a2b"/>
      <stop offset="100%" stop-color="#5a3510"/>
    </linearGradient>
    <linearGradient id="ic-steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3e48"/>
      <stop offset="100%" stop-color="#242830"/>
    </linearGradient>
    <filter id="ic-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ic-smokeglow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background sky (smoggy) -->
  <rect width="600" height="360" fill="url(#ic-sky)"/>

  <!-- Smoke/smog clouds -->
  <g filter="url(#ic-smokeglow)" opacity="0.25">
    <ellipse cx="150" cy="80" rx="120" ry="45" fill="#3a3020"/>
    <ellipse cx="350" cy="60" rx="100" ry="40" fill="#2e2818"/>
    <ellipse cx="500" cy="90" rx="130" ry="50" fill="#3a3020"/>
    <ellipse cx="60" cy="120" rx="80" ry="35" fill="#2e2818"/>
    <ellipse cx="450" cy="50" rx="90" ry="30" fill="#3a3020"/>
  </g>

  <!-- Distant industrial skyline -->
  <g fill="#161820">
    <rect x="0" y="160" width="30" height="200"/>
    <rect x="20" y="130" width="22" height="230"/>
    <rect x="50" y="155" width="28" height="205"/>
    <rect x="75" y="120" width="18" height="240"/>
    <rect x="490" y="150" width="30" height="210"/>
    <rect x="515" y="125" width="20" height="235"/>
    <rect x="530" y="145" width="28" height="215"/>
    <rect x="555" y="115" width="22" height="245"/>
    <rect x="575" y="135" width="25" height="225"/>
  </g>

  <!-- Chimney stacks with smoke -->
  <g fill="#101214">
    <rect x="28" y="108" width="10" height="30"/>
    <rect x="78" y="100" width="10" height="28"/>
    <rect x="521" y="103" width="10" height="30"/>
    <rect x="558" y="94" width="10" height="32"/>
  </g>

  <!-- Main citadel structure -->
  <g fill="url(#ic-steel)">
    <!-- Base platform -->
    <rect x="120" y="240" width="360" height="120"/>
    <!-- Main tower -->
    <rect x="200" y="130" width="200" height="230"/>
    <!-- Tower top -->
    <polygon points="200,130 300,90 400,130"/>
    <!-- Side towers -->
    <rect x="150" y="175" width="60" height="185"/>
    <rect x="390" y="175" width="60" height="185"/>
    <!-- Side tower tops -->
    <polygon points="150,175 180,150 210,175"/>
    <polygon points="390,175 420,150 450,175"/>
  </g>

  <!-- Citadel details - windows/openings with amber light -->
  <g filter="url(#ic-glow)">
    <rect x="230" y="165" width="20" height="25" fill="#cc7700" opacity="0.8"/>
    <rect x="280" y="165" width="20" height="25" fill="#cc7700" opacity="0.7"/>
    <rect x="350" y="165" width="20" height="25" fill="#cc7700" opacity="0.75"/>
    <rect x="230" y="215" width="20" height="25" fill="#aa5500" opacity="0.7"/>
    <rect x="280" y="215" width="20" height="25" fill="#aa5500" opacity="0.8"/>
    <rect x="350" y="215" width="20" height="25" fill="#aa5500" opacity="0.65"/>
    <rect x="230" y="265" width="20" height="25" fill="#884400" opacity="0.7"/>
    <rect x="350" y="265" width="20" height="25" fill="#884400" opacity="0.7"/>
    <!-- Side tower windows -->
    <rect x="164" y="200" width="14" height="18" fill="#aa5500" opacity="0.6"/>
    <rect x="164" y="235" width="14" height="18" fill="#aa5500" opacity="0.55"/>
    <rect x="404" y="200" width="14" height="18" fill="#aa5500" opacity="0.6"/>
    <rect x="404" y="235" width="14" height="18" fill="#aa5500" opacity="0.55"/>
  </g>

  <!-- Gear motif (large decorative gear) -->
  <g transform="translate(300,190)" fill="url(#ic-copper)" opacity="0.6">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#7a4820" stroke-width="8"/>
    <circle cx="0" cy="0" r="20" fill="#5a3010"/>
    <!-- Gear teeth -->
    <g fill="#7a4820">
      <rect x="-5" y="-45" width="10" height="12" rx="2"/>
      <rect x="-5" y="33" width="10" height="12" rx="2"/>
      <rect x="33" y="-5" width="12" height="10" rx="2"/>
      <rect x="-45" y="-5" width="12" height="10" rx="2"/>
      <g transform="rotate(45)">
        <rect x="-5" y="-45" width="10" height="12" rx="2"/>
        <rect x="-5" y="33" width="10" height="12" rx="2"/>
        <rect x="33" y="-5" width="12" height="10" rx="2"/>
        <rect x="-45" y="-5" width="12" height="10" rx="2"/>
      </g>
    </g>
    <!-- Center cross -->
    <rect x="-3" y="-20" width="6" height="40" fill="#8b5a2b" opacity="0.8"/>
    <rect x="-20" y="-3" width="40" height="6" fill="#8b5a2b" opacity="0.8"/>
  </g>

  <!-- Furnace glow at base -->
  <g filter="url(#ic-glow)">
    <ellipse cx="300" cy="295" rx="80" ry="25" fill="#ff6600" opacity="0.4"/>
    <ellipse cx="175" cy="305" rx="40" ry="15" fill="#cc4400" opacity="0.35"/>
    <ellipse cx="425" cy="305" rx="40" ry="15" fill="#cc4400" opacity="0.35"/>
  </g>

  <!-- Pipes and conduits -->
  <g stroke="#3a3e48" stroke-width="6" fill="none" opacity="0.8">
    <path d="M120,280 Q100,260 80,260 Q60,260 50,280"/>
    <path d="M480,280 Q500,260 520,260 Q540,260 550,280"/>
    <path d="M200,270 Q190,240 185,210"/>
    <path d="M400,270 Q410,240 415,210"/>
  </g>
  <g stroke="#5a3510" stroke-width="4" fill="none" opacity="0.6">
    <path d="M120,275 Q100,255 80,255 Q60,255 50,275"/>
    <path d="M480,275 Q500,255 520,255 Q540,255 550,275"/>
  </g>

  <!-- Steam puffs -->
  <g filter="url(#ic-smokeglow)" opacity="0.2" fill="#888">
    <circle cx="33" cy="95" r="18"/>
    <circle cx="83" cy="85" r="15"/>
    <circle cx="526" cy="88" r="18"/>
    <circle cx="563" cy="78" r="15"/>
  </g>

  <!-- Genre label -->
  <rect x="0" y="320" width="600" height="40" fill="#0a0c10" opacity="0.85"/>
  <text x="20" y="344" font-family="Georgia, serif" font-size="13" fill="#b07030" opacity="0.9" letter-spacing="3">STEAMPUNK</text>
  <text x="580" y="344" font-family="Georgia, serif" font-size="11" fill="#888060" opacity="0.8" text-anchor="end" letter-spacing="1">SHARP · POLITICAL</text>
</svg>
