<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="sr-bg" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0a0118"/>
      <stop offset="100%" stop-color="#1e0640"/>
    </linearGradient>
    <linearGradient id="sr-rift" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d0a50" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#060010" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="sr-shard1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a1880"/>
      <stop offset="100%" stop-color="#2a0e50"/>
    </linearGradient>
    <linearGradient id="sr-shard2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a1260"/>
      <stop offset="100%" stop-color="#1a0830"/>
    </linearGradient>
    <filter id="sr-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="sr-abyss" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#1a0030" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#000008" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background void -->
  <rect width="600" height="360" fill="url(#sr-bg)"/>

  <!-- Deep rift below -->
  <ellipse cx="300" cy="380" rx="320" ry="160" fill="url(#sr-abyss)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="42" cy="28" r="1.2"/><circle cx="120" cy="15" r="0.9"/>
    <circle cx="200" cy="40" r="1.4"/><circle cx="310" cy="12" r="0.8"/>
    <circle cx="420" cy="30" r="1.1"/><circle cx="530" cy="18" r="0.9"/>
    <circle cx="580" cy="55" r="1.3"/><circle cx="70" cy="70" r="0.8"/>
    <circle cx="160" cy="80" r="1.0"/><circle cx="490" cy="65" r="1.2"/>
    <circle cx="25" cy="110" r="0.9"/><circle cx="550" cy="90" r="0.8"/>
    <circle cx="355" cy="55" r="1.5"/><circle cx="78" cy="140" r="0.7"/>
    <circle cx="240" cy="22" r="1.0"/><circle cx="450" cy="95" r="0.9"/>
  </g>

  <!-- Floating island shards -->

  <!-- Large center island -->
  <polygon points="220,195 290,145 370,155 400,200 360,230 240,225" fill="url(#sr-shard1)" opacity="0.95"/>
  <polygon points="235,195 295,150 362,158 388,198 350,224 248,222" fill="#3a1265" opacity="0.4"/>

  <!-- Island top detail (crumbled edge) -->
  <polygon points="225,196 238,192 252,196 265,191 278,195 291,189 305,194 320,188 335,193 350,187 363,192 377,188 398,200" fill="#5a2090" opacity="0.5"/>

  <!-- Left floating shard -->
  <polygon points="60,170 110,140 155,155 165,185 130,200 75,195" fill="url(#sr-shard2)" opacity="0.9"/>
  <polygon points="62,171 112,142 153,156 162,184 132,198 78,193" fill="#2a0e48" opacity="0.3"/>

  <!-- Right floating shard -->
  <polygon points="430,160 490,135 540,148 555,178 510,195 445,188" fill="url(#sr-shard2)" opacity="0.85"/>

  <!-- Small distant shards -->
  <polygon points="150,100 175,85 200,92 205,110 180,118 148,112" fill="#3a1260" opacity="0.7"/>
  <polygon points="390,100 415,88 440,95 442,115 418,122 392,115" fill="#2e0e52" opacity="0.65"/>
  <polygon points="50,230 80,215 100,222 98,242 72,248 52,240" fill="#250940" opacity="0.8"/>
  <polygon points="500,220 530,205 555,215 552,238 524,244 502,236" fill="#200838" opacity="0.75"/>

  <!-- Tiny distant shards -->
  <polygon points="270,80 285,72 298,77 296,90 282,94 271,88" fill="#2d0c44" opacity="0.5"/>
  <polygon points="460,75 472,68 481,73 479,84 466,87" fill="#281040" opacity="0.45"/>

  <!-- Rift cracks between islands -->
  <g stroke="#7c2fbf" stroke-width="1" opacity="0.4" fill="none">
    <path d="M155,185 C180,210 200,220 220,195"/>
    <path d="M400,200 C415,210 425,205 430,185"/>
    <path d="M165,155 C180,130 200,125 205,110"/>
    <path d="M430,160 C420,140 415,125 440,115"/>
  </g>

  <!-- Magic energy points / gold glints -->
  <g filter="url(#sr-glow)">
    <circle cx="290" cy="170" r="2.5" fill="#c9a227" opacity="0.9"/>
    <circle cx="340" cy="158" r="2" fill="#c9a227" opacity="0.7"/>
    <circle cx="130" cy="160" r="1.8" fill="#b08820" opacity="0.8"/>
    <circle cx="510" cy="150" r="2" fill="#b08820" opacity="0.7"/>
    <circle cx="175" cy="95" r="1.5" fill="#c9a227" opacity="0.6"/>
    <circle cx="415" cy="95" r="1.5" fill="#c9a227" opacity="0.55"/>
    <circle cx="255" cy="190" r="1.2" fill="#d4b030" opacity="0.7"/>
    <circle cx="375" cy="195" r="1.2" fill="#d4b030" opacity="0.65"/>
  </g>

  <!-- Rift glow at bottom -->
  <ellipse cx="300" cy="290" rx="260" ry="60" fill="#2a0060" opacity="0.35"/>
  <ellipse cx="300" cy="310" rx="200" ry="40" fill="#3d0080" opacity="0.2"/>

  <!-- Atmospheric fog wisps -->
  <g opacity="0.15" fill="#9060c0">
    <ellipse cx="150" cy="250" rx="80" ry="20"/>
    <ellipse cx="420" cy="260" rx="90" ry="18"/>
    <ellipse cx="290" cy="280" rx="120" ry="15"/>
  </g>

  <!-- Genre label bar -->
  <rect x="0" y="320" width="600" height="40" fill="#0a0118" opacity="0.75"/>
  <text x="20" y="344" font-family="Georgia, serif" font-size="13" fill="#9060c0" opacity="0.9" letter-spacing="3">DARK FANTASY</text>
  <text x="580" y="344" font-family="Georgia, serif" font-size="11" fill="#c9a227" opacity="0.8" text-anchor="end" letter-spacing="1">GRIM · MYTHIC</text>
</svg>
