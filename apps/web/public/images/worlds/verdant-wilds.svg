<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="vw-sky" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#a8d4e8"/>
      <stop offset="50%" stop-color="#78b8d0"/>
      <stop offset="100%" stop-color="#4a9e58"/>
    </linearGradient>
    <radialGradient id="vw-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="40%" stop-color="#ffe880"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vw-sun-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe080" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffe080" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vw-ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d8a28"/>
      <stop offset="100%" stop-color="#2a6018"/>
    </linearGradient>
    <linearGradient id="vw-tree-l" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5aaa38"/>
      <stop offset="100%" stop-color="#2e7018"/>
    </linearGradient>
    <linearGradient id="vw-tree-d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3e8e25"/>
      <stop offset="100%" stop-color="#1e5010"/>
    </linearGradient>
    <filter id="vw-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vw-softglow">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="600" height="360" fill="url(#vw-sky)"/>

  <!-- Sun glow -->
  <circle cx="300" cy="85" r="90" fill="url(#vw-sun-glow)" filter="url(#vw-softglow)"/>

  <!-- Sun rays -->
  <g stroke="#ffe860" stroke-width="2" opacity="0.35" transform="translate(300,85)">
    <line x1="0" y1="-75" x2="0" y2="-110"/>
    <line x1="53" y1="-53" x2="77" y2="-77"/>
    <line x1="75" y1="0" x2="110" y2="0"/>
    <line x1="53" y1="53" x2="77" y2="77"/>
    <line x1="0" y1="75" x2="0" y2="110"/>
    <line x1="-53" y1="53" x2="-77" y2="77"/>
    <line x1="-75" y1="0" x2="-110" y2="0"/>
    <line x1="-53" y1="-53" x2="-77" y2="-77"/>
  </g>

  <!-- Sun -->
  <circle cx="300" cy="85" r="36" fill="url(#vw-sun)" opacity="0.95"/>

  <!-- Distant hills -->
  <ellipse cx="100" cy="240" rx="180" ry="80" fill="#5aaa38" opacity="0.7"/>
  <ellipse cx="500" cy="235" rx="180" ry="75" fill="#5aaa38" opacity="0.65"/>
  <ellipse cx="300" cy="250" rx="220" ry="70" fill="#4a9a30" opacity="0.6"/>

  <!-- Ground -->
  <rect x="0" y="270" width="600" height="90" fill="url(#vw-ground)"/>
  <!-- Ground details -->
  <ellipse cx="300" cy="268" rx="350" ry="25" fill="#3a8020" opacity="0.5"/>

  <!-- Background trees (distant, lighter) -->
  <g opacity="0.7">
    <!-- Tree group center-back -->
    <ellipse cx="300" cy="215" rx="50" ry="60" fill="#5aaa38"/>
    <rect x="294" y="255" width="12" height="40" fill="#5a3a18"/>
    <ellipse cx="260" cy="225" rx="38" ry="50" fill="#4e9e30"/>
    <rect x="255" y="260" width="10" height="35" fill="#5a3a18"/>
    <ellipse cx="340" cy="220" rx="38" ry="48" fill="#4e9e30"/>
    <rect x="334" y="255" width="10" height="35" fill="#5a3a18"/>
  </g>

  <!-- Mid trees (left) -->
  <ellipse cx="90" cy="220" rx="55" ry="70" fill="url(#vw-tree-l)" opacity="0.9"/>
  <ellipse cx="90" cy="235" rx="65" ry="55" fill="url(#vw-tree-d)" opacity="0.85"/>
  <rect x="82" y="268" width="16" height="55" fill="#4a2e10" opacity="0.95"/>

  <!-- Mid trees (right) -->
  <ellipse cx="510" cy="218" rx="55" ry="68" fill="url(#vw-tree-l)" opacity="0.9"/>
  <ellipse cx="510" cy="235" rx="65" ry="52" fill="url(#vw-tree-d)" opacity="0.85"/>
  <rect x="502" y="268" width="16" height="55" fill="#4a2e10" opacity="0.95"/>

  <!-- Foreground trees (large, left) -->
  <ellipse cx="20" cy="230" rx="70" ry="85" fill="#4a9e28" opacity="0.95"/>
  <ellipse cx="20" cy="250" rx="80" ry="65" fill="#3a8018" opacity="0.9"/>
  <rect x="10" y="290" width="20" height="70" fill="#3a2008" opacity="0.95"/>

  <!-- Foreground trees (large, right) -->
  <ellipse cx="580" cy="225" rx="70" ry="85" fill="#4a9e28" opacity="0.95"/>
  <ellipse cx="580" cy="248" rx="78" ry="62" fill="#3a8018" opacity="0.9"/>
  <rect x="570" y="288" width="20" height="72" fill="#3a2008" opacity="0.95"/>

  <!-- Flowers / ground detail -->
  <g opacity="0.8">
    <circle cx="180" cy="274" r="4" fill="#ffcc00"/>
    <circle cx="220" cy="278" r="3" fill="#ff9944"/>
    <circle cx="260" cy="272" r="4" fill="#ffcc00"/>
    <circle cx="340" cy="275" r="3.5" fill="#ff8844"/>
    <circle cx="380" cy="271" r="4" fill="#ffcc00"/>
    <circle cx="420" cy="276" r="3" fill="#ff9944"/>
    <circle cx="140" cy="278" r="3" fill="#ff8844"/>
    <circle cx="460" cy="273" r="3.5" fill="#ffcc00"/>
  </g>

  <!-- Light shafts through canopy -->
  <g opacity="0.12" fill="#ffe880">
    <polygon points="250,100 270,100 200,280 180,280"/>
    <polygon points="320,95 340,95 390,285 370,285"/>
    <polygon points="290,90 305,90 295,285 280,285"/>
  </g>

  <!-- Floating light motes -->
  <g filter="url(#vw-glow)" opacity="0.7">
    <circle cx="180" cy="200" r="3" fill="#ffe860"/>
    <circle cx="390" cy="185" r="2.5" fill="#ffe860"/>
    <circle cx="310" cy="160" r="2" fill="#ffe860"/>
    <circle cx="240" cy="175" r="2" fill="#ffe860"/>
    <circle cx="450" cy="210" r="2.5" fill="#ffe860"/>
  </g>

  <!-- Genre label -->
  <rect x="0" y="320" width="600" height="40" fill="#1a4810" opacity="0.8"/>
  <text x="20" y="344" font-family="Georgia, serif" font-size="13" fill="#78d450" opacity="0.9" letter-spacing="3">NATURE FANTASY</text>
  <text x="580" y="344" font-family="Georgia, serif" font-size="11" fill="#c8e890" opacity="0.8" text-anchor="end" letter-spacing="1">WARM · FAMILY-SAFE</text>
</svg>
