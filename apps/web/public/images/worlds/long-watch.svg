        <rect x="260" y="180" width="80" height="80" fill="#0880c0" opacity="0.25" transform="rotate(15,300,220)"/>
        <circle cx="300" cy="150" r="5" fill="#00c0e0" opacity="0.8"/>
        <circle cx="200" cy="240" r="4" fill="#00c0e0" opacity="0.6"/>
        <circle cx="400" cy="240" r="4" fill="#00c0e0" opacity="0.6"/>
        <line x1="300" y1="100" x2="200" y2="280" stroke="#00c0e0" stroke-width="1" opacity="0.2"/>
        <line x1="300" y1="100" x2="400" y2="280" stroke="#00c0e0" stroke-width="1" opacity="0.2"/>
  <rect x="0" y="320" width="600" height="40" fill="#020810" opacity="0.82"/>
