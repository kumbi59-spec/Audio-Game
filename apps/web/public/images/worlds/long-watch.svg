<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="cg-bg" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="100%" stop-color="#041420"/>
    </linearGradient>
    <filter id="cg-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="360" fill="url(#cg-bg)"/>
  
        <polygon points="300,100 400,200 300,200" fill="#0880c0" opacity="0.5"/>
