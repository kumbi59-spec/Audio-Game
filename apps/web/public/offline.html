<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — EchoQuest</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      font-family: system-ui, -apple-system, sans-serif;
      background: #080b12;
      color: #e8e6f0;
      text-align: center;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    p  { font-size: 1rem; color: #8b8fa8; margin: 0; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 0.625rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>You're offline</h1>
  <p>
    EchoQuest needs an internet connection to reach the AI Game Master.<br />
    Check your connection and try again.
  </p>
  <button onclick="location.reload()">Try again</button>
  <script>
    // Announce to screen readers.
    document.addEventListener("DOMContentLoaded", () => {
      if ("speechSynthesis" in window) {
        const u = new SpeechSynthesisUtterance(
          "You are offline. EchoQuest needs an internet connection to reach the AI Game Master. Check your connection and try again."
        );
        window.speechSynthesis.speak(u);
      }
    });
  </script>
</body>
</html>
