name: Credentialed E2E (manual)

# This workflow runs the full external stack (Anthropic, optionally Voyage /
# ElevenLabs / Deepgram, and real Postgres + pgvector) against the CLI e2e
# harness. It is strictly manual — it burns credits and hits third-party
# services. Trigger from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      include_postgres:
        description: "Run against Postgres + pgvector"
        type: boolean
        default: true
      include_voyage:
        description: "Embed bibles + turns via Voyage AI (requires secret)"
        type: boolean
        default: false

jobs:
  e2e:
    name: "CLI e2e against real providers"
    runs-on: ubuntu-latest
    environment: credentialed
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: audio_rpg
          POSTGRES_PASSWORD: audio_rpg
          POSTGRES_DB: audio_rpg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U audio_rpg -d audio_rpg"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # Required for the real Claude turn to execute.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Optional — each one gates a feature; empty means skip that feature.
      VOYAGE_API_KEY: ${{ inputs.include_voyage && secrets.VOYAGE_API_KEY || '' }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      DEEPGRAM_PROJECT_ID: ${{ secrets.DEEPGRAM_PROJECT_ID }}
      DATABASE_URL: ${{ inputs.include_postgres && 'postgres://audio_rpg:audio_rpg@localhost:5432/audio_rpg' || '' }}
      AUDIO_RPG_API: http://127.0.0.1:4000
      LOG_LEVEL: info
    steps:
      - name: Fail fast if ANTHROPIC_API_KEY is missing
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: |
          echo "::error::ANTHROPIC_API_KEY secret is required. Configure it under Settings → Environments → credentialed."
          exit 1

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @audio-rpg/shared --filter @audio-rpg/gm-engine build

      - name: Wait for Postgres
        if: ${{ inputs.include_postgres }}
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/5432) >/dev/null 2>&1; then
              echo "postgres ready"; exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready"; exit 1

      - name: Start API server
        run: |
          pnpm --filter @audio-rpg/api dev >> api.log 2>&1 &
          echo $! > api.pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4000/health >/dev/null 2>&1; then
              echo "api ready"; exit 0
            fi
            sleep 1
          done
          echo "::error::api did not come up"
          tail -n 200 api.log || true
          exit 1

      - name: Run CLI e2e
        run: pnpm --filter @audio-rpg/api e2e

      - name: Dump API log
        if: always()
        run: |
          if [ -f api.log ]; then
            echo "::group::api.log (last 400 lines)"
            tail -n 400 api.log
            echo "::endgroup::"
          fi

      - name: Stop API server
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" 2>/dev/null || true
          fi
