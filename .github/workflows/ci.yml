name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "typecheck + unit + in-memory integration"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -r typecheck
      - run: pnpm --filter @audio-rpg/shared --filter @audio-rpg/gm-engine --filter @audio-rpg/api test

  postgres-e2e:
    name: "integration (Postgres + pgvector)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: audio_rpg
          POSTGRES_PASSWORD: audio_rpg
          POSTGRES_DB: audio_rpg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U audio_rpg -d audio_rpg"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://audio_rpg:audio_rpg@localhost:5432/audio_rpg
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/5432) >/dev/null 2>&1; then
              echo "postgres ready"
              exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready"
          exit 1
      - run: pnpm --filter @audio-rpg/api test

  web-e2e:
    name: "web e2e (Playwright + axe-core)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @audio-rpg/mobile test:e2e:install
      - run: pnpm --filter @audio-rpg/mobile test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/mobile/playwright-report/
          retention-days: 7
