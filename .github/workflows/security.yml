name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 14:00 UTC so newly-disclosed CVEs against pinned deps surface
    # without requiring a code change.
    - cron: "0 14 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  osv-scan-and-gate:
    name: "OSV-Scanner + release gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install OSV-Scanner
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v1.9.0/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version

      - run: pnpm install --frozen-lockfile=false

      # Produce SARIF for the Security tab. Don't fail the job on findings —
      # the gate step below decides what's release-blocking.
      - name: Run OSV-Scanner (SARIF)
        run: |
          osv-scanner \
            --lockfile pnpm-lock.yaml \
            --format sarif \
            --output results.sarif \
            || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: osv-scanner

      - name: Release gate (high/critical = fail)
        run: pnpm run security:release-gate
